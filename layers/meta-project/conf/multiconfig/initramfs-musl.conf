# Multiconfig for the initramfs image only.
#
# This file intentionally specializes the environment for an early-boot
# initramfs, not for a general-purpose root filesystem. The goal is to keep the
# image small, self-contained, and compatible with musl by avoiding features and
# runtime stacks that assume a full userspace.
#
# In practice this specialization does four things:
# 1. switches the MC to musl and keeps its output isolated in a separate TMPDIR,
# 2. forces a BusyBox-based init/runtime stack instead of systemd,
# 3. disables machine and package features that are not useful in an initramfs
#    and that otherwise pull in large bootloader, QEMU, or systemd dependencies,
# 4. removes SPDX image-combine hooks that are not needed for this minimal image
#    path and have caused rootfs-time failures.
TCLIBC = "musl"
TMPDIR .= "-${BB_CURRENT_MC}"

# Prevent the initramfs MC from recursively trying to satisfy another initramfs
# dependency through a second multiconfig resolution.
INITRAMFS_MULTICONFIG = ""
INITRAMFS_IMAGE = ""

# The initramfs artifact does not need to build or select a real kernel here.
# Keeping the kernel provider as a stub avoids unrelated kernel work in this MC.
PREFERRED_PROVIDER_virtual/kernel = "linux-dummy"

# Force a BusyBox/mdev init policy. This is specific to the initramfs use case,
# where a tiny early userspace is preferred over a full system manager.
INIT_MANAGER = "mdev-busybox"

# Keep only the distro features that are required for a minimal initramfs.
# Removing systemd and PAM here prevents distro-level defaults from reintroducing
# a larger userspace that is inappropriate for this image.
DISTRO_FEATURES = "ipv4 ipv6 sysvinit usrmerge"
DISTRO_FEATURES:remove = " systemd pam"
DISTRO_FEATURES_BACKFILL_CONSIDERED = "systemd sysvinit pam"

# Remove machine features that would pull in bootloader or emulation tooling.
# Those are useful for full machine images, but not for the initramfs payload
# itself, and they can indirectly drag systemd or QEMU into the dependency graph.
MACHINE_FEATURES:remove = " efi qemu-usermode"
MACHINE_FEATURES_BACKFILL_CONSIDERED += " qemu-usermode rtc"
EFI_PROVIDER = ""
SYSTEMD_BOOT_CFG = ""
SYSTEMD_BOOT_ENTRIES = ""

# Belt-and-suspenders guards: even if a dependency path changes upstream, do not
# allow systemd or systemd-boot to become valid choices in this multiconfig.
PACKAGE_EXCLUDE:append = " systemd systemd-boot"
SKIP_RECIPE[systemd] = "systemd is disabled for mc:initramfs-musl"
SKIP_RECIPE[systemd-boot] = "systemd-boot is disabled for mc:initramfs-musl"

# QEMU artifacts are not part of the initramfs payload and are excluded to keep
# this MC focused on the boot image contents rather than host-side run helpers.
PACKAGE_EXCLUDE:append = " qemu qemu-system qemu-system-x86 qemu-system-aarch64 qemu-system-arm qemu-system-misc"

# SPDX image-combine hooks are disabled only for this initramfs MC because they
# add rootfs-time bookkeeping that is not required for the specialized minimal
# image and has produced missing-document failures in this path.
INHERIT_DISTRO:remove = "create-spdx"
INHERIT:remove = "create-spdx"
ROOTFS_POSTUNINSTALL_COMMAND:remove = "image_combine_spdx"

# Runtime providers are pinned to BusyBox-oriented implementations so the image
# stays aligned with the minimal early-boot environment described above.
VIRTUAL-RUNTIME_base-utils = "busybox"
VIRTUAL-RUNTIME_base-utils-hwclock = "busybox-hwclock"
VIRTUAL-RUNTIME_base-utils-syslog = "busybox-syslog"
VIRTUAL-RUNTIME_dev_manager = "busybox-mdev"
VIRTUAL-RUNTIME_graphical_init_manager = ""
VIRTUAL-RUNTIME_init_manager = "busybox"
VIRTUAL-RUNTIME_initscripts = ""
VIRTUAL-RUNTIME_login_manager = "busybox"
VIRTUAL-RUNTIME_net_manager = ""
VIRTUAL-RUNTIME_syslog = "busybox-syslog"
VIRTUAL-RUNTIME_container_engine = ""
VIRTUAL-RUNTIME_container_runtime = ""
VIRTUAL-RUNTIME_container_networking = ""
VIRTUAL-RUNTIME_container_orchestration = ""
VIRTUAL-RUNTIME_cri = ""
VIRTUAL-RUNTIME_cni = ""

BUSYBOX_SPLIT_SUID = "0"
