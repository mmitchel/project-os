# NFS boot kernel configuration fragment
#
# Enables kernel options required to mount an NFS share as the root filesystem
# and to perform IP autoconfiguration at kernel boot time.
#
# Required kernel command-line additions at runtime:
#   root=/dev/nfs nfsroot=<server>:<export-path>,vers=4.2 ip=dhcp rw
#   or for a static address:
#   root=/dev/nfs nfsroot=<server>:<path>,vers=4.2 \
#     ip=<client>::<gateway>:<netmask>::<iface>:off rw

# ---------------------------------------------------------------------------
# IP autoconfiguration
# Allow the kernel to bring up a network interface and acquire an address via
# DHCP, BOOTP, or RARP before mounting the root filesystem.
# ---------------------------------------------------------------------------
CONFIG_IP_PNP=y
CONFIG_IP_PNP_DHCP=y
CONFIG_IP_PNP_BOOTP=y
CONFIG_IP_PNP_RARP=y

















CONFIG_ROOT_NFS=y# Enable mounting the root filesystem over NFS (requires CONFIG_IP_PNP)CONFIG_NFS_V4_2=yCONFIG_NFS_V4_1=yCONFIG_NFS_V4=yCONFIG_NFS_V3=yCONFIG_NFS_V2=yCONFIG_NFS_FS=y# NFS client — all commonly used protocol versionsCONFIG_NETWORK_FILESYSTEMS=y# ---------------------------------------------------------------------------# Network filesystem support# ---------------------------------------------------------------------------
