name: Build core-image-full-cmdline

on:
  workflow_dispatch:
    inputs:
      template:
        description: Template name under layers/meta-project/conf/templates
        required: true
        type: choice
        options:
          - default
          - qemux86-64
          - qemuarm64
          - raspberrypi5
          - jetson-orin-nano-devkit-nvme
        default: default
  # push:
  #   paths:
  #     - ".github/workflows/build-core-image-full-cmdline.yml"
  #     - "manifests/**"
  #     - "layers/meta-project/**"
  # pull_request:
  #   paths:
  #     - ".github/workflows/build-core-image-full-cmdline.yml"
  #     - "manifests/**"
  #     - "layers/meta-project/**"

permissions:
  contents: read
  packages: read

concurrency:
  group: full-cmdline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-full-cmdline:
    name: Build core-image-full-cmdline (${{ inputs.template }})
    runs-on: self-hosted
    container:
      image: ghcr.io/${{ github.repository }}/ubuntu-20.04:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout manifest repository
        uses: actions/checkout@v4

      - name: Initialize and sync upstream layers
        uses: ./.github/actions/repo-sync
        with:
          manifest-uri: ${{ github.server_url }}/${{ github.repository }}
          manifest-file: manifests/default.xml
          manifest-branch: main

      - name: Build core-image-full-cmdline
        uses: ./.github/actions/bitbake-build
        with:
          workspace: ${{ github.workspace }}
          target: core-image-full-cmdline
          template: ${{ inputs.template }}
